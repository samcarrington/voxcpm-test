<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VoxCPM2 TTS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="status">Connecting...</div>

    <form id="generate-form">
        <fieldset>
            <legend>Text &amp; Voice</legend>
            <label for="text">Text</label>
            <textarea id="text" name="text" required placeholder="Enter text to synthesize..."></textarea>

            <label for="voice_description">Voice Description (optional)</label>
            <input type="text" id="voice_description" name="voice_description" placeholder="e.g., warm female voice">
        </fieldset>

        <fieldset>
            <legend>Reference Audio</legend>
            <input type="file" id="reference_upload" name="reference_upload" accept=".wav,.flac,.mp3,.m4a,.ogg">
            <div id="selected-reference" style="display:none;"></div>
        </fieldset>

        <fieldset>
            <legend>Settings</legend>
            <label for="cfg_value">CFG
                <span id="cfg_value_display">2.0</span>
            </label>
            <input type="range" id="cfg_value" name="cfg_value" min="1.0" max="3.0" step="0.1" value="2.0">

            <label for="inference_timesteps">Steps</label>
            <input type="number" id="inference_timesteps" name="inference_timesteps" min="1" max="50" value="20">

            <label>
                <input type="checkbox" id="normalize" name="normalize" checked> Normalize text
            </label>

            <label for="attempts">Attempts</label>
            <input type="number" id="attempts" name="attempts" min="1" max="10" value="2">

            <label for="seed">Seed (optional)</label>
            <input type="number" id="seed" name="seed" placeholder="Random">
        </fieldset>

        <div class="actions">
            <button type="submit" id="generate-btn">Generate</button>
            <button type="button" id="stream-btn" disabled>Generate &amp; Stream Live</button>
        </div>
    </form>

    <div id="stream-progress" style="display:none;"></div>

    <audio id="player" controls style="display:none;"></audio>

    <div id="history">
        <h3>History</h3>
        <ul id="history-list"></ul>
        <h3>Uploaded References</h3>
        <ul id="uploads-list"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
